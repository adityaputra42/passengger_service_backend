basePath: /api/v1
definitions:
  dto.AddBaggageRequest:
    properties:
      passenger_id:
        type: string
      segment_id:
        type: string
      weight:
        type: number
    required:
    - passenger_id
    - segment_id
    - weight
    type: object
  dto.AddMealRequest:
    properties:
      meal_code:
        maxLength: 10
        type: string
      segment_id:
        type: string
    required:
    - meal_code
    - segment_id
    type: object
  dto.AddSSRRequest:
    properties:
      segment_id:
        type: string
      ssr_code:
        maxLength: 10
        type: string
    required:
    - segment_id
    - ssr_code
    type: object
  dto.AircraftResponse:
    properties:
      id:
        type: string
      manufacturer:
        type: string
      model:
        type: string
      seats:
        items:
          $ref: '#/definitions/dto.AircraftSeatResponse'
        type: array
      total_seats:
        type: integer
    type: object
  dto.AircraftSeatResponse:
    properties:
      id:
        type: string
      is_exit_row:
        type: boolean
      row_number:
        type: integer
      seat_class:
        $ref: '#/definitions/dto.SeatClassResponse'
      seat_letter:
        type: string
      seat_number:
        type: string
      seat_type:
        type: string
      x_position:
        type: integer
      y_position:
        type: integer
    type: object
  dto.AirportResponse:
    properties:
      city:
        type: string
      code:
        type: string
      country:
        type: string
      id:
        type: string
      name:
        type: string
      timezone:
        type: string
    type: object
  dto.AuthResponseDTO:
    properties:
      access_token:
        type: string
      expires_at:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.BaggageResponse:
    properties:
      id:
        type: string
      passenger_id:
        type: string
      segment_id:
        type: string
      status:
        $ref: '#/definitions/models.BaggageStatus'
      tag_number:
        type: string
      weight:
        type: number
    type: object
  dto.BoardingPassResponse:
    properties:
      boarding_group:
        type: string
      boarding_time:
        type: string
      departure_time:
        type: string
      destination:
        type: string
      flight_number:
        type: string
      gate:
        type: string
      id:
        type: string
      origin:
        type: string
      passenger_id:
        type: string
      passenger_name:
        type: string
      qr_code:
        type: string
      seat_number:
        type: string
      segment_id:
        type: string
    type: object
  dto.ChangePasswordRequest:
    properties:
      new_password:
        minLength: 8
        type: string
      old_password:
        minLength: 6
        type: string
    required:
    - new_password
    - old_password
    type: object
  dto.CheckinRequest:
    properties:
      passenger_id:
        type: string
      segment_id:
        type: string
    required:
    - passenger_id
    - segment_id
    type: object
  dto.CheckinResponse:
    properties:
      checkin_time:
        type: string
      id:
        type: string
      passenger_id:
        type: string
      segment_id:
        type: string
    type: object
  dto.CheckinResultResponse:
    properties:
      boarding_pass:
        $ref: '#/definitions/dto.BoardingPassResponse'
      checkin:
        $ref: '#/definitions/dto.CheckinResponse'
    type: object
  dto.ContactRequest:
    properties:
      email:
        maxLength: 255
        type: string
      name:
        maxLength: 255
        type: string
      phone:
        maxLength: 50
        type: string
    required:
    - email
    - name
    - phone
    type: object
  dto.CreateAircraftRequest:
    properties:
      manufacturer:
        maxLength: 100
        type: string
      model:
        maxLength: 100
        type: string
    required:
    - manufacturer
    - model
    type: object
  dto.CreateAirportRequest:
    properties:
      city:
        maxLength: 255
        type: string
      code:
        type: string
      country:
        maxLength: 255
        type: string
      name:
        maxLength: 255
        type: string
      timezone:
        maxLength: 100
        type: string
    required:
    - city
    - code
    - country
    - name
    - timezone
    type: object
  dto.CreateBookingRequest:
    properties:
      contact:
        $ref: '#/definitions/dto.ContactRequest'
      passengers:
        items:
          $ref: '#/definitions/dto.PassengerRequest'
        maxItems: 9
        minItems: 1
        type: array
      segments:
        items:
          $ref: '#/definitions/dto.SegmentRequest'
        maxItems: 8
        minItems: 1
        type: array
      trip_type:
        allOf:
        - $ref: '#/definitions/dto.TripType'
        enum:
        - one_way
        - round_trip
        - multi_city
    required:
    - contact
    - passengers
    - segments
    - trip_type
    type: object
  dto.CreateFlightScheduleRequest:
    properties:
      arrival_airport_code:
        type: string
      arrival_time:
        type: string
      departure_airport_code:
        type: string
      departure_time:
        type: string
      flight_number:
        maxLength: 10
        type: string
      operating_days:
        type: string
    required:
    - arrival_airport_code
    - arrival_time
    - departure_airport_code
    - departure_time
    - flight_number
    - operating_days
    type: object
  dto.CreateUserRequest:
    properties:
      email:
        type: string
      full_name:
        maxLength: 50
        minLength: 1
        type: string
      password:
        maxLength: 100
        minLength: 8
        type: string
      role_id:
        minimum: 1
        type: integer
    required:
    - password
    - role_id
    type: object
  dto.FlightListResponse:
    properties:
      flights:
        items:
          $ref: '#/definitions/dto.FlightResponse'
        type: array
    type: object
  dto.FlightResponse:
    properties:
      aircraft:
        $ref: '#/definitions/dto.AircraftResponse'
      arrival_time:
        type: string
      available_seats:
        type: integer
      departure_time:
        type: string
      duration_minutes:
        type: integer
      flight_number:
        type: string
      id:
        type: string
      lowest_price:
        type: number
      schedule:
        $ref: '#/definitions/dto.FlightScheduleResponse'
      status:
        $ref: '#/definitions/models.FlightStatus'
    type: object
  dto.FlightScheduleResponse:
    properties:
      arrival_airport:
        $ref: '#/definitions/dto.AirportResponse'
      arrival_time:
        type: string
      departure_airport:
        $ref: '#/definitions/dto.AirportResponse'
      departure_time:
        type: string
      flight_number:
        type: string
      id:
        type: string
      operating_days:
        type: string
    type: object
  dto.FlightSeatResult:
    properties:
      class_code:
        type: string
      class_name:
        type: string
      flight_seat:
        $ref: '#/definitions/models.FlightSeat'
      is_exit_row:
        type: boolean
      row_number:
        type: integer
      seat_letter:
        type: string
      seat_number:
        type: string
      seat_type:
        type: string
    type: object
  dto.GenerateSeatsRequest:
    properties:
      classes:
        items:
          $ref: '#/definitions/dto.SeatClassConfig'
        minItems: 1
        type: array
    required:
    - classes
    type: object
  dto.InitiatePaymentRequest:
    properties:
      method:
        allOf:
        - $ref: '#/definitions/models.PaymentMethod'
        enum:
        - credit_card
        - debit_card
        - bank_transfer
        - e_wallet
      pnr_id:
        type: string
    required:
    - method
    - pnr_id
    type: object
  dto.IssueBoardingPassRequest:
    properties:
      boarding_group:
        maxLength: 10
        type: string
      boarding_time:
        type: string
      gate:
        maxLength: 10
        type: string
      passenger_id:
        type: string
      segment_id:
        type: string
    required:
    - boarding_group
    - boarding_time
    - gate
    - passenger_id
    - segment_id
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  dto.PNRContactResponse:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      phone:
        type: string
    type: object
  dto.PNRListResponse:
    properties:
      limit:
        type: integer
      page:
        type: integer
      pnrs:
        items:
          $ref: '#/definitions/dto.PNRResponse'
        type: array
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  dto.PNRPassengerResponse:
    properties:
      baggage:
        items:
          $ref: '#/definitions/dto.BaggageResponse'
        type: array
      birth_date:
        type: string
      first_name:
        type: string
      full_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      meals:
        items:
          $ref: '#/definitions/dto.PassengerMealResponse'
        type: array
      passenger_type:
        $ref: '#/definitions/models.PassengerType'
      passport_number:
        type: string
      seat_assignment:
        $ref: '#/definitions/dto.SeatAssignmentResponse'
      ssrs:
        items:
          $ref: '#/definitions/dto.PassengerSSRResponse'
        type: array
      ticket:
        $ref: '#/definitions/dto.TicketResponse'
    type: object
  dto.PNRResponse:
    properties:
      contact:
        $ref: '#/definitions/dto.PNRContactResponse'
      created_at:
        type: string
      id:
        type: string
      passengers:
        items:
          $ref: '#/definitions/dto.PNRPassengerResponse'
        type: array
      payments:
        items:
          $ref: '#/definitions/dto.PaymentResponse'
        type: array
      record_locator:
        type: string
      segments:
        items:
          $ref: '#/definitions/dto.PNRSegmentResponse'
        type: array
      status:
        $ref: '#/definitions/models.PNRStatus'
      total_amount:
        type: number
      trip_type:
        type: string
      ttl:
        type: string
    type: object
  dto.PNRSegmentResponse:
    properties:
      flight:
        $ref: '#/definitions/dto.FlightResponse'
      id:
        type: string
      segment_order:
        type: integer
    type: object
  dto.PassengerMealResponse:
    properties:
      id:
        type: string
      meal_code:
        type: string
      meal_name:
        type: string
      segment_id:
        type: string
    type: object
  dto.PassengerRequest:
    properties:
      birth_date:
        type: string
      first_name:
        maxLength: 100
        type: string
      last_name:
        maxLength: 100
        type: string
      passenger_type:
        allOf:
        - $ref: '#/definitions/models.PassengerType'
        enum:
        - ADT
        - CHD
        - INF
      passport_number:
        maxLength: 50
        type: string
    required:
    - first_name
    - last_name
    - passenger_type
    type: object
  dto.PassengerSSRResponse:
    properties:
      id:
        type: string
      segment_id:
        type: string
      ssr_code:
        type: string
      ssr_name:
        type: string
    type: object
  dto.PaymentResponse:
    properties:
      amount:
        type: number
      id:
        type: string
      method:
        $ref: '#/definitions/models.PaymentMethod'
      paid_at:
        type: string
      pnr_id:
        type: string
      status:
        $ref: '#/definitions/models.PaymentStatus'
    type: object
  dto.RoleInput:
    properties:
      description:
        maxLength: 500
        type: string
      is_system_role:
        type: boolean
      level:
        minimum: 1
        type: integer
      name:
        maxLength: 50
        minLength: 2
        type: string
      permission_ids:
        items:
          type: integer
        type: array
    required:
    - level
    - name
    type: object
  dto.RolePermissionInput:
    properties:
      permission_ids:
        items:
          type: integer
        minItems: 1
        type: array
    required:
    - permission_ids
    type: object
  dto.SeatAssignmentResponse:
    properties:
      assigned_at:
        type: string
      flight_seat_id:
        type: string
      id:
        type: string
      seat_class:
        $ref: '#/definitions/dto.SeatClassResponse'
      seat_number:
        type: string
      segment_id:
        type: string
    type: object
  dto.SeatClassConfig:
    properties:
      class_code:
        enum:
        - F
        - C
        - "Y"
        type: string
      exit_row_nums:
        items:
          type: integer
        type: array
      letters:
        items:
          type: string
        minItems: 1
        type: array
      rows:
        minimum: 1
        type: integer
    required:
    - class_code
    - letters
    - rows
    type: object
  dto.SeatClassResponse:
    properties:
      code:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  dto.SeatSelectionRequest:
    properties:
      flight_seat_id:
        type: string
      passenger_index:
        minimum: 0
        type: integer
    required:
    - flight_seat_id
    type: object
  dto.SegmentRequest:
    properties:
      flight_id:
        type: string
      seat_selections:
        items:
          $ref: '#/definitions/dto.SeatSelectionRequest'
        type: array
    required:
    - flight_id
    type: object
  dto.TicketResponse:
    properties:
      id:
        type: string
      issued_at:
        type: string
      ticket_number:
        type: string
    type: object
  dto.TripType:
    enum:
    - one_way
    - round_trip
    - multi_city
    type: string
    x-enum-varnames:
    - TripOneWay
    - TripRoundTrip
    - TripMultiCity
  dto.UpdateAircraftRequest:
    properties:
      manufacturer:
        maxLength: 100
        type: string
      model:
        maxLength: 100
        type: string
    type: object
  dto.UpdateAirportRequest:
    properties:
      city:
        maxLength: 255
        type: string
      country:
        maxLength: 255
        type: string
      name:
        maxLength: 255
        type: string
      timezone:
        maxLength: 100
        type: string
    type: object
  dto.UpdateContactRequest:
    properties:
      email:
        maxLength: 255
        type: string
      name:
        maxLength: 255
        type: string
      phone:
        maxLength: 50
        type: string
    type: object
  dto.UpdateFlightScheduleRequest:
    properties:
      arrival_time:
        type: string
      departure_time:
        type: string
      operating_days:
        type: string
    type: object
  dto.UpdateProfileRequest:
    properties:
      full_name:
        maxLength: 255
        minLength: 2
        type: string
    type: object
  dto.UpdateUserRequest:
    properties:
      full_name:
        maxLength: 255
        minLength: 2
        type: string
      role_id:
        type: integer
    type: object
  dto.UserListResponse:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
      users:
        items:
          $ref: '#/definitions/dto.UserResponse'
        type: array
    type: object
  dto.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      full_name:
        type: string
      role_id:
        type: integer
      uid:
        type: string
      updated_at:
        type: string
    type: object
  models.Aircraft:
    properties:
      id:
        type: string
      manufacturer:
        maxLength: 100
        type: string
      model:
        maxLength: 100
        type: string
      seats:
        items:
          $ref: '#/definitions/models.AircraftSeat'
        type: array
      total_seats:
        minimum: 0
        type: integer
    type: object
  models.AircraftSeat:
    properties:
      aircraft:
        $ref: '#/definitions/models.Aircraft'
      aircraft_id:
        type: string
      id:
        type: string
      is_exit_row:
        type: boolean
      row_number:
        minimum: 1
        type: integer
      seat_class:
        $ref: '#/definitions/models.SeatClass'
      seat_class_id:
        type: string
      seat_letter:
        maxLength: 1
        type: string
      seat_number:
        maxLength: 5
        type: string
      seat_type:
        maxLength: 20
        type: string
      x_position:
        type: integer
      y_position:
        type: integer
    required:
    - aircraft_id
    - row_number
    - seat_number
    type: object
  models.Airport:
    properties:
      city:
        maxLength: 255
        type: string
      code:
        type: string
      country:
        maxLength: 255
        type: string
      id:
        type: string
      name:
        maxLength: 255
        type: string
      timezone:
        maxLength: 100
        type: string
    required:
    - code
    type: object
  models.BaggageStatus:
    enum:
    - checked_in
    - loaded
    - delivered
    - lost
    type: string
    x-enum-varnames:
    - BaggageCheckedIn
    - BaggageLoaded
    - BaggageDelivered
    - BaggageLost
  models.Flight:
    properties:
      aircraft:
        $ref: '#/definitions/models.Aircraft'
      aircraft_id:
        type: string
      arrival_time:
        type: string
      departure_time:
        type: string
      flight_seats:
        items:
          $ref: '#/definitions/models.FlightSeat'
        type: array
      id:
        type: string
      schedule:
        $ref: '#/definitions/models.FlightSchedule'
      schedule_id:
        type: string
      status:
        allOf:
        - $ref: '#/definitions/models.FlightStatus'
        enum:
        - scheduled
        - boarding
        - departed
        - arrived
        - cancelled
        - delayed
    type: object
  models.FlightSchedule:
    properties:
      arrival_airport:
        $ref: '#/definitions/models.Airport'
      arrival_airport_id:
        type: string
      arrival_time:
        type: string
      departure_airport:
        $ref: '#/definitions/models.Airport'
      departure_airport_id:
        type: string
      departure_time:
        type: string
      flight_number:
        maxLength: 10
        type: string
      flights:
        items:
          $ref: '#/definitions/models.Flight'
        type: array
      id:
        type: string
      operating_days:
        type: string
    type: object
  models.FlightSeat:
    properties:
      aircraft_seat:
        $ref: '#/definitions/models.AircraftSeat'
      aircraft_seat_id:
        type: string
      flight:
        $ref: '#/definitions/models.Flight'
      flight_id:
        type: string
      id:
        type: string
      price:
        minimum: 0
        type: number
      status:
        allOf:
        - $ref: '#/definitions/models.FlightSeatStatus'
        enum:
        - available
        - locked
        - booked
    type: object
  models.FlightSeatStatus:
    enum:
    - available
    - locked
    - booked
    type: string
    x-enum-varnames:
    - FlightSeatAvailable
    - FlightSeatLocked
    - FlightSeatBooked
  models.FlightStatus:
    enum:
    - scheduled
    - boarding
    - departed
    - arrived
    - cancelled
    - delayed
    type: string
    x-enum-varnames:
    - FlightStatusScheduled
    - FlightStatusBoarding
    - FlightStatusDeparted
    - FlightStatusArrived
    - FlightStatusCancelled
    - FlightStatusDelayed
  models.PNRStatus:
    enum:
    - hold
    - confirmed
    - cancelled
    - ticketed
    type: string
    x-enum-varnames:
    - PNRStatusHold
    - PNRStatusConfirmed
    - PNRStatusCancelled
    - PNRStatusTicketed
  models.PassengerType:
    enum:
    - ADT
    - CHD
    - INF
    type: string
    x-enum-comments:
      PassengerADT: Adult
      PassengerCHD: Child
      PassengerINF: Infant
    x-enum-descriptions:
    - Adult
    - Child
    - Infant
    x-enum-varnames:
    - PassengerADT
    - PassengerCHD
    - PassengerINF
  models.PaymentMethod:
    enum:
    - credit_card
    - debit_card
    - bank_transfer
    - e_wallet
    type: string
    x-enum-varnames:
    - PaymentMethodCreditCard
    - PaymentMethodDebitCard
    - PaymentMethodBankTransfer
    - PaymentMethodEWallet
  models.PaymentStatus:
    enum:
    - pending
    - success
    - failed
    - refunded
    type: string
    x-enum-varnames:
    - PaymentStatusPending
    - PaymentStatusSuccess
    - PaymentStatusFailed
    - PaymentStatusRefunded
  models.Permission:
    properties:
      action:
        maxLength: 50
        minLength: 2
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        maxLength: 100
        minLength: 3
        type: string
      resource:
        maxLength: 50
        minLength: 2
        type: string
      roles:
        items:
          $ref: '#/definitions/models.Role'
        type: array
      updated_at:
        type: string
    required:
    - action
    - name
    - resource
    type: object
  models.Role:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      is_system_role:
        type: boolean
      level:
        minimum: 1
        type: integer
      name:
        maxLength: 50
        minLength: 2
        type: string
      permissions:
        items:
          $ref: '#/definitions/models.Permission'
        type: array
      updated_at:
        type: string
      users:
        items:
          $ref: '#/definitions/models.User'
        type: array
    required:
    - level
    - name
    type: object
  models.SeatClass:
    properties:
      code:
        maxLength: 10
        type: string
      id:
        type: string
      name:
        maxLength: 50
        type: string
    type: object
  models.User:
    properties:
      created_at:
        type: string
      email:
        maxLength: 255
        type: string
      full_name:
        maxLength: 255
        minLength: 2
        type: string
      role:
        $ref: '#/definitions/models.Role'
      role_id:
        type: integer
      uid:
        type: string
      updated_at:
        type: string
    required:
    - email
    - full_name
    - role_id
    type: object
  utils.Response:
    properties:
      data: {}
      error:
        type: string
      message:
        type: string
      success:
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    email: support@airline.com
    name: API Support
  description: REST API untuk sistem Passenger Service System (PSS) maskapai penerbangan.
    Mencakup manajemen penerbangan, pemesanan tiket, check-in, bagasi, dan boarding
    pass.
  license:
    name: MIT
